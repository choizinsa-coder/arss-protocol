[pytest]
addopts = --import-mode=importlib
testpaths = tests tools/governance
norecursedirs = .git __pycache__ .pytest_cache *.egg-info node_modules venv .venv build dist logs n8n* sandbox archive* aiba-mcp-bridge 99_LEGACY ARSS_HUB failed samples reference-* quarantine*

markers =
    isolated: HC-T related containment isolation tests
    integration: integration tests requiring full environment
