# /etc/nginx/conf.d/aiba-observation-http.conf
# AIBA Observation Server — http 블록 레벨 선언
# limit_req_zone + log_format은 http 블록에서만 유효

limit_req_zone $binary_remote_addr zone=observation_limit:10m rate=30r/m;

log_format observation_masked
    '$remote_addr - $remote_user [$time_local] '
    '"$request_method $request_uri $server_protocol" '
    '$status $body_bytes_sent '
    '"[AUTH_MASKED]"';
